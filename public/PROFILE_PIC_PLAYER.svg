<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <rect width="64" height="64" fill="#111122"/>

  <!-- Helmet top -->
  <rect x="16" y="0"  width="32" height="8" fill="#6688aa"/>
  <!-- Helmet mid -->
  <rect x="8"  y="8"  width="48" height="8" fill="#7799bb"/>
  <!-- Helmet visor row -->
  <rect x="8"  y="16" width="8"  height="8" fill="#7799bb"/>
  <rect x="16" y="16" width="8"  height="8" fill="#1a2a3a"/>
  <rect x="24" y="16" width="16" height="8" fill="#7799bb"/>
  <rect x="40" y="16" width="8"  height="8" fill="#1a2a3a"/>
  <rect x="48" y="16" width="8"  height="8" fill="#7799bb"/>
  <!-- Highlight on visor -->
  <rect x="18" y="18" width="4"  height="3" fill="#334455"/>
  <rect x="42" y="18" width="4"  height="3" fill="#334455"/>
  <!-- Chin guard -->
  <rect x="8"  y="24" width="48" height="8" fill="#6688aa"/>
  <!-- Silver gorget -->
  <rect x="8"  y="32" width="48" height="8" fill="#aabbcc"/>
  <!-- Chest armor -->
  <rect x="4"  y="40" width="56" height="8" fill="#3355cc"/>
  <rect x="4"  y="48" width="56" height="8" fill="#2a4ab8"/>
  <!-- Armor trim -->
  <rect x="4"  y="40" width="4"  height="16" fill="#1a2a88"/>
  <rect x="56" y="40" width="4"  height="16" fill="#1a2a88"/>
  <!-- Legs -->
  <rect x="8"  y="56" width="16" height="8" fill="#3355cc"/>
  <rect x="40" y="56" width="16" height="8" fill="#3355cc"/>
  <!-- Boot tips -->
  <rect x="8"  y="60" width="16" height="4" fill="#1a2a88"/>
  <rect x="40" y="60" width="16" height="4" fill="#1a2a88"/>
</svg>
